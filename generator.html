<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tile Production Configurator 3D</title>

<link rel="stylesheet" href="styles.css">

<!-- THREE + OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<div class="container">

<h1>Tile Production Configurator 3D</h1>
<p class="subtitle">Factory-ready tile visualization system</p>

<div class="layout">

<!-- LEFT PANEL -->
<div class="panel">

<label>Pattern Description</label>
<input type="text" id="prompt" placeholder="White marble with subtle gold veins">

<label>Tile Size</label>
<select id="tileSize">
  <option value="30">30x30 cm</option>
  <option value="60" selected>60x60 cm</option>
  <option value="80">80x80 cm</option>
</select>

<label>DPI</label>
<select id="dpi">
  <option value="150">150 DPI</option>
  <option value="300" selected>300 DPI</option>
  <option value="600">600 DPI</option>
</select>

<label>Zoom</label>
<input type="range" id="zoomControl" min="0.5" max="3" step="0.1" value="1">

<button id="generateBtn">Generate Tile</button>

<hr>

<h3>Saved Designs</h3>
<div id="gallery" class="gallery"></div>

<hr>

<p><strong>Price per Tile:</strong> <span id="pricePerTile">0</span> THB</p>
<p><strong>Minimum Production (100 sqm):</strong> <span id="minTiles">0</span></p>
<p><strong>Total Cost:</strong> <span id="totalCost">0</span> THB</p>

</div>

<!-- RIGHT VIEWER -->
<div id="viewer"></div>

</div>
</div>

<script src="room3d.js"></script>

<script>

const generateBtn = document.getElementById("generateBtn");
generateBtn.addEventListener("click", generateTile);

window.addEventListener("DOMContentLoaded", loadSavedTiles);

/* ================= LOAD SAVED TILES ================= */

async function loadSavedTiles() {

  const user = JSON.parse(localStorage.getItem("user"));

  if (!user || !user.id) {
    console.log("No logged in user");
    return;
  }

  try {

    const res = await fetch("/tiles/" + parseInt(user.id));

    if (!res.ok) {
      console.log("Failed loading tiles");
      return;
    }

    const tiles = await res.json();

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    tiles.forEach(tile => {

      const img = document.createElement("img");
      img.src = tile.tile_url;

      img.onclick = () => {
        if (typeof applyTexture === "function") {
          applyTexture(tile.tile_url);
        }
      };

      gallery.appendChild(img);
    });

  } catch (err) {
    console.log("Load tiles error:", err);
  }
}

/* ================= GENERATE ================= */

async function generateTile() {

  const prompt = document.getElementById("prompt").value.trim();
  const tileSize = document.getElementById("tileSize").value;
  const dpi = document.getElementById("dpi").value;

  const user = JSON.parse(localStorage.getItem("user"));

  if (!user || !user.id) {
    alert("Please login first");
    return;
  }

  if (!prompt) {
    alert("Enter pattern description");
    return;
  }

  generateBtn.disabled = true;
  generateBtn.innerText = "Generating...";

  try {

    const bodyData = {
      prompt: prompt,
      userId: parseInt(user.id),
      tileSize: tileSize || null,
      dpi: dpi ? parseInt(dpi) : null
    };

    console.log("Sending to backend:", bodyData);

    const res = await fetch("/generate-tile", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(bodyData)
    });

    if (!res.ok) {
      const errText = await res.text();
      alert("Generation failed: " + errText);
      return;
    }

    const data = await res.json();

    if (typeof applyTexture === "function") {
      applyTexture(data.tileUrl);
    }

    loadSavedTiles();

  } catch (err) {
    console.log("Generate error:", err);
    alert("Server error during generation");
  } finally {
    generateBtn.disabled = false;
    generateBtn.innerText = "Generate Tile";
  }
}

</script>

</body>
</html>
