<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TileAI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  background: #0f1a27;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}

.logo { font-size: 16px; font-weight: 600; }
.logo span { color: #60a5fa; }

.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.user-email {
  font-size: 13px;
  color: #475569;
  font-family: 'IBM Plex Mono', monospace;
}

.logout-btn {
  font-size: 13px;
  color: #475569;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: color .15s;
}
.logout-btn:hover { color: #f87171; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 48px;
}

.headline { text-align: center; }

.headline h1 {
  font-size: 32px;
  font-weight: 600;
  color: #e2e8f0;
  margin-bottom: 10px;
  line-height: 1.3;
}

.headline p {
  font-size: 15px;
  color: #475569;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 720px;
  width: 100%;
}

.card {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
  padding: 28px 24px;
  transition: border-color .2s;
}

.card:hover { border-color: rgba(96,165,250,.25); }

.card-icon { font-size: 22px; margin-bottom: 14px; }

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: #cbd5e1;
  margin-bottom: 8px;
}

.card-desc {
  font-size: 13px;
  color: #475569;
  line-height: 1.6;
}

.cta-btn {
  padding: 14px 36px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.cta-btn:hover { background: #2563eb; }

@media (max-width: 600px) {
  nav { padding: 16px 20px; }
  main { padding: 40px 20px; }
  .cards { grid-template-columns: 1fr; }
  .headline h1 { font-size: 24px; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">✦ Tile<span>AI</span></div>
  <div class="nav-right">
    <span class="user-email" id="navEmail"></span>
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
  </div>
</nav>

<main>
  <div class="headline">
    <h1>ออกแบบกระเบื้องด้วย AI</h1>
    <p>พิมพ์ลวดลาย เลือกวัสดุ รับใบเสนอราคาได้เลย</p>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">✦</div>
      <div class="card-title">AI Generate</div>
      <div class="card-desc">สร้างลวดลายกระเบื้องจาก prompt ภาษาไทยหรืออังกฤษ</div>
    </div>
    <div class="card">
      <div class="card-icon">⬜</div>
      <div class="card-title">3D Preview</div>
      <div class="card-desc">จำลองกระเบื้องบนผนังหรือพื้นในโมเดล 3D แบบ real-time</div>
    </div>
    <div class="card">
      <div class="card-icon">฿</div>
      <div class="card-title">ใบเสนอราคา</div>
      <div class="card-desc">คำนวณค่าวัสดุ + ค่าแรง พร้อม export PDF</div>
    </div>
  </div>

  <button class="cta-btn" onclick="window.location.href='generator.html'">
    เริ่มออกแบบเลย →
  </button>
</main>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) window.location.href = "login.html";
  document.getElementById("navEmail").textContent = user.email;

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }
</script>
</body>
</html>
