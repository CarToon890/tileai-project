<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TileAI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom right, #dfe6ed, #cfd8e3);
}

.login-card {
    background: white;
    padding: 40px;
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

h1 { margin-bottom: 10px; }

p {
    color: gray;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #1e2a3a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2d3e55;
}

.signup {
    margin-top: 20px;
}

.signup a {
    color: blue;
    text-decoration: none;
    cursor: pointer;
}

.error {
    color: red;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-card">
    <h1>Welcome Back</h1>
    <p>Log in to your account</p>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Enter your email" required>
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="submit" id="loginBtn">Log In</button>
    </form>

    <div class="error" id="errorMsg"></div>

    <div class="signup">
        Don’t have an account? 
        <a onclick="goRegister()">Sign Up</a>
    </div>
</div>

<script>

/* ================= AUTO REDIRECT ================= */

const savedUser = localStorage.getItem("user");

if (savedUser) {
    try {
        const parsed = JSON.parse(savedUser);
        if (parsed && parsed.id) {
            window.location.href = "home.html";
        }
    } catch (e) {
        localStorage.removeItem("user");
    }
}

/* ================= LOGIN ================= */

document.getElementById("loginForm").addEventListener("submit", login);

async function login(event) {
    event.preventDefault();

    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");

    errorMsg.innerText = "";
    loginBtn.disabled = true;
    loginBtn.innerText = "Logging in...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        let data;

        // รองรับกรณี server ส่ง text กลับมา
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
            data = await response.json();
        } else {
            data = await response.text();
        }

        if (!response.ok) {
            errorMsg.innerText = typeof data === "string" ? data : "Login failed";
            loginBtn.disabled = false;
            loginBtn.innerText = "Log In";
            return;
        }

        if (!data.user || !data.user.id) {
            errorMsg.innerText = "Invalid user data from server";
            loginBtn.disabled = false;
            loginBtn.innerText = "Log In";
            return;
        }

        // ✅ Save user correctly
        localStorage.setItem("user", JSON.stringify({
            id: data.user.id,
            email: data.user.email
        }));

        window.location.href = "home.html";

    } catch (error) {
        console.error(error);
        errorMsg.innerText = "Cannot connect to server";
        loginBtn.disabled = false;
        loginBtn.innerText = "Log In";
    }
}

/* ================= REGISTER REDIRECT ================= */

function goRegister() {
    window.location.href = "register.html";
}

</script>

</body>
</html>
